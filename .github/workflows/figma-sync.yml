name: Figma Sync

# Triggers:
#   1. repository_dispatch (figma-publish) — called by the webhook bridge when Figma publishes
#   2. workflow_dispatch — manual run from GitHub UI (with optional force flag)
#   3. schedule — fallback polling every 6 hours in case the webhook is not configured

on:
  repository_dispatch:
    types: [figma-publish]

  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if Figma version has not changed"
        type: boolean
        default: false

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: figma-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Figma Tokens
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Figma sync script
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--apply"
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            ARGS="--apply --force"
          fi
          npx tsx scripts/sync-figma-tokens.ts $ARGS

      - name: Check for file changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "--- Changed files ---"
            git diff --name-only
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: figma-sync/run-${{ github.run_number }}
          base: main
          commit-message: "chore(tokens): sync from Figma Design System 2026"
          title: "chore(tokens): Figma Design System sync — run #${{ github.run_number }}"
          body: |
            ## Figma Design System Sync

            This PR was automatically generated after a new version was published in Figma.

            | Field | Value |
            |---|---|
            | Trigger | `${{ github.event_name }}` |
            | Workflow run | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            | Figma file | [Design System](https://www.figma.com/design/Lt10bBK2NAbygocsLpxtIM) |

            ### Review checklist

            - [ ] Color values look correct in both light and dark themes
            - [ ] Typography scale is consistent
            - [ ] Spacing values match the 4px grid
            - [ ] No unexpected tokens were removed
            - [ ] Storybook still renders correctly after the change

            > Generated by `scripts/sync-figma-tokens.ts` using Claude.
          labels: |
            tokens
            figma-sync
            automated
          draft: false
