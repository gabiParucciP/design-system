name: Figma Button Sync

on:
  repository_dispatch:
    types: [figma-publish]

  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: figma-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Button From Figma
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run button sync script
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: npx tsx scripts/sync-figma-tokens.ts --apply

      - name: Check for file changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "--- Changed files ---"
            git diff --name-only
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: figma-sync/run-${{ github.run_number }}
          base: main
          commit-message: "chore(button): sync button from figma"
          title: "chore(button): sync button from figma - run #${{ github.run_number }}"
          body: |
            ## Button Sync

            This PR updates only the Button component using data read from the Figma file content API.

            | Field | Value |
            |---|---|
            | Trigger | `${{ github.event_name }}` |
            | Workflow run | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Generated by `scripts/sync-figma-tokens.ts`.
          labels: |
            button
            figma-sync
            automated
          draft: false
